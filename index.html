<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIỂM TRA NHẬN THỨC CHÍNH TRỊ</title>

<style>
body{
margin:0;
font-family:"Times New Roman", Times, serif;
background:#8B0000;
}

.header{
background:#b30000;
color:white;
padding:15px;
display:flex;
align-items:center;
}

.logo{
width:80px;
margin-right:15px;
}

.container{
max-width:1000px;
margin:20px auto;
background:white;
padding:25px;
border-radius:10px;
}

h1{text-align:center;color:#8B0000;}

.menu button{
display:block;
width:100%;
margin:10px 0;
padding:15px;
font-size:22px;
background:#8B0000;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.menu button:hover{
transform:scale(1.05);
background:#cc0000;
}

#startScreen{
display:none;
text-align:center;
padding:30px;
background:#fff4f4;
border:3px solid #8B0000;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
max-width:600px;
margin:30px auto;
}

.question-box{
background:#fff4f4;
padding:15px;
margin-bottom:15px;
border-left:6px solid #8B0000;
border-radius:6px;
}

.sticky-progress{
position:sticky;
top:0;
background:white;
padding:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

.progress-bar-container{
width:100%;
height:18px;
background:#ddd;
border-radius:8px;
overflow:hidden;
margin-top:5px;
}

.progress-bar{
height:100%;
width:0%;
background:green;
transition:0.3s;
}

.submit-btn,.home-btn{
padding:10px 15px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-family:"Times New Roman", Times, serif;
}

.submit-btn{background:green;color:white;}
.home-btn{background:#444;color:white;}

.timer{text-align:right;color:#8B0000;font-weight:bold;}
.score{text-align:center;font-size:20px;font-weight:bold;}

.footer{
width:100%;
background:linear-gradient(90deg,#8B0000,#cc0000,#8B0000);
color:yellow;
text-align:center;
padding:18px;
font-weight:bold;
font-size:20px;
letter-spacing:2px;
text-shadow:1px 1px 2px black;
margin-top:40px;
}
  .result-box{
max-width:500px;
margin:40px auto;
background:#fff4f4;
border:3px solid #8B0000;
border-radius:12px;
padding:30px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.result-title{
font-size:24px;
font-weight:bold;
color:#8B0000;
margin-bottom:20px;
}

.result-score{
font-size:20px;
margin-bottom:15px;
}

.result-status{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.result-message{
font-size:18px;
margin-bottom:20px;
}
</style>
</head>

<body>

<div class="header">
<img src="logo.png" class="logo">
<div>
<b>ĐẠI ĐỘI THÔNG TIN 2</b><br>
"Kịp thời - Chính xác - Bí mật - An toàn"
</div>
</div>

<div class="container">
<h1>KIỂM TRA NHẬN THỨC CHÍNH TRỊ</h1>

<div id="menu" class="menu">
<button onclick="startQuiz('bo1')">SĨ QUAN</button>
<button onclick="startQuiz('bo2')">QUÂN NHÂN CHUYÊN NGHIỆP</button>
<button onclick="startQuiz('bo3')">CHIẾN SĨ</button>
</div>

<div id="startScreen">
<h2>KIỂM TRA NHẬN THỨC CHÍNH TRỊ</h2>
<h3 id="targetName"></h3>
<p><b>Thời gian làm bài: 20 phút</b></p>
<div style="margin:20px 0;">
<label><b>HỌ VÀ TÊN:</b></label><br>
<input type="text" id="fullName" 
style="width:80%;padding:10px;font-size:16px;text-align:center;">
</div>
<p>Chúc bạn đạt được kết quả cao</p>
<button class="submit-btn" onclick="beginQuiz()">BẮT ĐẦU</button>
</div>

<div id="info" style="display:none;" class="sticky-progress">
<div id="timer" class="timer"></div>
Đã làm: <span id="answeredCount">0</span>/<span id="totalQuestion">0</span>
<div class="progress-bar-container">
<div id="progressBar" class="progress-bar"></div>
</div>
</div>

<form id="quizForm" style="display:none;"></form>
<button id="submitBtn" class="submit-btn" style="display:none;" onclick="submitQuiz()">Nộp bài</button>
<div id="result"></div>

</div>

<div class="footer">
QUYẾT TÂM HOÀN THÀNH XUẤT SẮC NHIỆM VỤ HUẤN LUYỆN NĂM 2026
</div>

<script src="questions.js"></script>

<script>

let currentQuestions=[];
let timerInterval;
let timeLeft=1200;
let selectedType="";
let candidateName="";

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

function startQuiz(type){
selectedType=type;

let targetText={
bo1:"ĐỐI TƯỢNG: SĨ QUAN",
bo2:"ĐỐI TƯỢNG: QUÂN NHÂN CHUYÊN NGHIỆP",
bo3:"ĐỐI TƯỢNG: CHIẾN SĨ"
};

document.getElementById("menu").style.display="none";
document.getElementById("startScreen").style.display="block";
document.getElementById("targetName").innerText=targetText[type];
}

function beginQuiz(){
candidateName = document.getElementById("fullName").value.trim();

if(candidateName === ""){
alert("Vui lòng nhập HỌ VÀ TÊN trước khi bắt đầu!");
return;
}

document.getElementById("startScreen").style.display="none";
document.getElementById("quizForm").style.display="block";
document.getElementById("submitBtn").style.display="inline-block";
document.getElementById("info").style.display="block";

currentQuestions = shuffle([...questionSets[selectedType]]);
document.getElementById("totalQuestion").innerText=currentQuestions.length;

renderQuestions();
startTimer();
}

function renderQuestions(){
let form=document.getElementById("quizForm");
form.innerHTML="";

currentQuestions.forEach((q,index)=>{
let div=document.createElement("div");
div.className="question-box";

div.innerHTML=`<b>Câu ${index+1}:</b> ${q.question}<br><br>`;

q.answers.forEach((a,i)=>{
div.innerHTML+=`
<label>
<input type="radio" name="q${index}" value="${i}" onchange="updateProgress()">
${a.text}
</label><br>`;
});

form.appendChild(div);
});
}

function updateProgress(){
let answered=document.querySelectorAll("input[type=radio]:checked").length;
document.getElementById("answeredCount").innerText=answered;
document.getElementById("progressBar").style.width=
(answered/currentQuestions.length*100)+"%";
}

function startTimer(){
timeLeft=1200;
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
document.getElementById("timer").innerHTML=
"Thời gian: "+m+":"+(s<10?"0":"")+s;
timeLeft--;
if(timeLeft<0){
clearInterval(timerInterval);
submitQuiz();
}
},1000);
}

function submitQuiz(){
clearInterval(timerInterval);
let score=0;

currentQuestions.forEach((q,index)=>{
let selected=document.querySelector(`input[name="q${index}"]:checked`);
if(selected && q.answers[selected.value].correct){
score++;
}
});

let total=currentQuestions.length;
let percent=(score/total)*100;

let statusText="";
let statusColor="";
let messageText="";

if(percent>=70){
statusText="ĐẠT";
statusColor="green";
messageText="Chúc mừng bạn đã đạt được kết quả cao";
}else{
statusText="KHÔNG ĐẠT";
statusColor="red";
messageText="Bạn cần ôn luyện thêm";
}

document.getElementById("quizForm").style.display="none";
document.getElementById("submitBtn").style.display="none";
document.getElementById("info").style.display="none";

document.getElementById("result").innerHTML=`
<div id="resultImage" class="result-box">
<div class="result-title">KẾT QUẢ KIỂM TRA</div>
<div style="margin-bottom:15px;"><b>Họ và tên:</b> ${candidateName}</div>
<div class="result-score">Số câu đúng: ${score}/${total}</div>
<div class="result-status" style="color:${statusColor}">
${statusText}
</div>
<div class="result-message">
${messageText}
</div>
<div style="text-align:center;margin-top:20px;">
<button class="submit-btn" onclick="downloadResult()">TẢI KẾT QUẢ (.PNG)</button>
<button class="home-btn" onclick="goHome()">
TRANG CHỦ
</button>

</div>
</div>
`;
}

function goHome(){
document.getElementById("menu").style.display="block";
document.getElementById("quizForm").style.display="none";
document.getElementById("submitBtn").style.display="none";
document.getElementById("info").style.display="none";
document.getElementById("startScreen").style.display="none";
document.getElementById("quizForm").innerHTML="";
document.getElementById("result").innerHTML="";
document.getElementById("answeredCount").innerText="0";
document.getElementById("progressBar").style.width="0%";
clearInterval(timerInterval);
}
  function downloadResult(){

let element = document.getElementById("resultImage");

html2canvas(element).then(function(canvas){

let link = document.createElement("a");
link.download = "ket-qua-kiem-tra.png";
link.href = canvas.toDataURL("image/png");
link.click();

});

}
</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
