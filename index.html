<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIỂM TRA NHẬN THỨC CHÍNH TRỊ</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#8B0000;
}

.header{
background:#b30000;
color:white;
padding:15px;
display:flex;
align-items:center;
}

.logo{
width:60px;
margin-right:15px;
}

.container{
max-width:950px;
margin:20px auto;
background:white;
padding:25px;
border-radius:10px;
}

h1{text-align:center;color:#8B0000;}

.menu button{
display:block;width:100%;margin:10px 0;
padding:12px;font-size:16px;
background:#8B0000;color:white;
border:none;border-radius:6px;
cursor:pointer;
}

.question-box{
background:#fff4f4;
padding:15px;
margin-bottom:15px;
border-left:6px solid #8B0000;
border-radius:6px;
}

.question-title{font-weight:bold;margin-bottom:8px;}

.correct-icon{color:green;font-weight:bold;margin-left:10px;}
.wrong-icon{color:red;font-weight:bold;margin-left:10px;}

.sticky-progress{
position:sticky;
top:0;
background:white;
padding:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

.progress-bar-container{
width:100%;height:18px;background:#ddd;
border-radius:8px;overflow:hidden;margin-top:5px;
}
.progress-bar{
height:100%;width:0%;
background:green;transition:0.3s;
}

.submit-btn,.home-btn{
padding:10px 15px;
margin-top:10px;
border:none;border-radius:6px;
cursor:pointer;
}

.submit-btn{background:green;color:white;}
.home-btn{background:#444;color:white;}

.timer{text-align:right;color:#8B0000;font-weight:bold;}
.score{text-align:center;font-size:20px;font-weight:bold;}
</style>
</head>

<body>

<div class="header">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Emblem_of_the_People%27s_Army_of_Vietnam.svg/1024px-Emblem_of_the_People%27s_Army_of_Vietnam.svg.png" class="logo">
<div>
<b>ĐẠI ĐỘI TT</b><br>
"Kịp thời - Chính xác - Bí mật - An toàn"
</div>
</div>

<div class="container">
<h1>KIỂM TRA NHẬN THỨC CHÍNH TRỊ</h1>

<div id="menu" class="menu">
<button onclick="startQuiz('bo1')">SĨ QUAN</button>
<button onclick="startQuiz('bo2')">QUÂN NHÂN CHUYÊN NGHIỆP</button>
<button onclick="startQuiz('bo3')">CHIẾN SĨ</button>
</div>

<div id="info" style="display:none;" class="sticky-progress">
<div id="timer" class="timer"></div>
Đã làm: <span id="answeredCount">0</span>/20
<div class="progress-bar-container">
<div id="progressBar" class="progress-bar"></div>
</div>
</div>

<form id="quizForm" style="display:none;"></form>
<button id="submitBtn" class="submit-btn" style="display:none;" onclick="submitQuiz()">Nộp bài</button>
<div id="result"></div>

</div>

<script>

let currentQuestions = [];
let timerInterval;
let timeLeft = 1200;

/* ================= SHUFFLE ================= */
function shuffle(array){
return array.sort(()=>Math.random()-0.5);
}

/* ================= QUESTION BANK ================= */
function generateQuestions(group){
let arr=[];
for(let i=1;i<=20;i++){
arr.push({
question: group + " - Câu hỏi số " + i + "?",
answers: shuffle([
{text:"Đáp án A", correct:true},
{text:"Đáp án B", correct:false},
{text:"Đáp án C", correct:false},
{text:"Đáp án D", correct:false}
])
});
}
return arr;
}

const bo1 = generateQuestions("Sĩ quan");
const bo2 = generateQuestions("Quân nhân chuyên nghiệp");
const bo3 = generateQuestions("Chiến sĩ");

const questionSets = {bo1, bo2, bo3};

/* ================= START QUIZ ================= */
function startQuiz(type){

document.getElementById("menu").style.display="none";
document.getElementById("quizForm").style.display="block";
document.getElementById("submitBtn").style.display="inline-block";
document.getElementById("info").style.display="block";
document.getElementById("result").innerHTML="";

currentQuestions = shuffle([...questionSets[type]]);

renderQuestions();
startTimer();
}

/* ================= RENDER ================= */
function renderQuestions(){
let form = document.getElementById("quizForm");
form.innerHTML="";

currentQuestions.forEach((q,index)=>{
let div=document.createElement("div");
div.className="question-box";

div.innerHTML=`<div class="question-title">
Câu ${index+1}: ${q.question}
</div>`;

q.answers.forEach((a,i)=>{
div.innerHTML+=`
<label>
<input type="radio" name="q${index}" value="${i}" onchange="updateProgress()">
${a.text}
</label><br>`;
});

form.appendChild(div);
});
}

/* ================= PROGRESS ================= */
function updateProgress(){
let answered=document.querySelectorAll("input[type=radio]:checked").length;
document.getElementById("answeredCount").innerText=answered;
document.getElementById("progressBar").style.width=
(answered/20*100)+"%";
}

/* ================= TIMER ================= */
function startTimer(){
timeLeft=1200;
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
document.getElementById("timer").innerHTML=
"Thời gian: "+m+":"+(s<10?"0":"")+s;
timeLeft--;
if(timeLeft<0){
clearInterval(timerInterval);
submitQuiz();
}
},1000);
}

/* ================= SUBMIT ================= */
function submitQuiz(){

clearInterval(timerInterval);

let score=0;

currentQuestions.forEach((q,index)=>{

let selected=document.querySelector(`input[name="q${index}"]:checked`);
let labels=document.querySelectorAll(`input[name="q${index}"]`);

labels.forEach((input,i)=>{
let parent=input.parentElement;
parent.innerHTML=input.nextSibling.textContent;

if(q.answers[i].correct){
parent.innerHTML+="<span class='correct-icon'> ✓</span>";
}

if(selected && i==selected.value && !q.answers[i].correct){
parent.innerHTML+="<span class='wrong-icon'> ✗</span>";
}
});

if(selected && q.answers[selected.value].correct){
score++;
}
});

document.getElementById("submitBtn").style.display="none";

document.getElementById("result").innerHTML=`
<div class="score">Kết quả: ${score}/20</div>
<button class="home-btn" onclick="goHome()">Quay về trang chủ</button>
`;
}

/* ================= HOME ================= */
function goHome(){

document.getElementById("menu").style.display="block";
document.getElementById("quizForm").style.display="none";
document.getElementById("submitBtn").style.display="none";
document.getElementById("info").style.display="none";

document.getElementById("quizForm").innerHTML="";
document.getElementById("result").innerHTML="";
document.getElementById("answeredCount").innerText="0";
document.getElementById("progressBar").style.width="0%";

clearInterval(timerInterval);
}

</script>

</body>
</html>
