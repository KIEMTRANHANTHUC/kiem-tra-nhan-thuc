<script>

let currentQuestions = [];
let timerInterval;
let timeLeft = 1200; // 20 phút

/* ================= QUESTION BANK ================= */

const bo1 = generateQuestions("Sĩ quan");
const bo2 = generateQuestions("Quân nhân chuyên nghiệp");
const bo3 = generateQuestions("Chiến sĩ");

function generateQuestions(group){
let arr=[];
for(let i=1;i<=20;i++){
arr.push({
question: group + " - Câu hỏi số " + i + "?",
answers: shuffle([
{text:"Đáp án A", correct:true},
{text:"Đáp án B", correct:false},
{text:"Đáp án C", correct:false},
{text:"Đáp án D", correct:false}
])
});
}
return arr;
}

/* ================= SHUFFLE ================= */

function shuffle(array){
return array.sort(()=>Math.random()-0.5);
}

/* ================= START QUIZ ================= */

function startQuiz(type){

if(document.getElementById("fullname").value.trim()==""){
alert("Vui lòng nhập họ tên trước khi làm bài!");
return;
}

document.getElementById("menu").style.display="none";
document.getElementById("quizForm").style.display="block";
document.getElementById("submitBtn").style.display="inline-block";
document.getElementById("info").style.display="block";

currentQuestions = shuffle([...eval(type)]);

renderQuestions();
startTimer();
}

/* ================= RENDER ================= */

function renderQuestions(){
let form = document.getElementById("quizForm");
form.innerHTML="";

currentQuestions.forEach((q,index)=>{

let div = document.createElement("div");
div.className="question-box";

let title = document.createElement("div");
title.className="question-title";
title.innerHTML="Câu "+(index+1)+": "+q.question;

div.appendChild(title);

let answerDiv = document.createElement("div");
answerDiv.className="answers";

q.answers.forEach((a,i)=>{
let label=document.createElement("label");
label.innerHTML=`<input type="radio" name="q${index}" value="${i}" onchange="updateProgress()"> ${a.text}`;
answerDiv.appendChild(label);
});

div.appendChild(answerDiv);
form.appendChild(div);

});
}

/* ================= TIMER ================= */

function startTimer(){
timeLeft = 1200;
clearInterval(timerInterval);
timerInterval = setInterval(()=>{
let minutes = Math.floor(timeLeft/60);
let seconds = timeLeft%60;
document.getElementById("timer").innerHTML=
"Thời gian còn lại: "+minutes+":"+(seconds<10?"0":"")+seconds;
timeLeft--;
if(timeLeft<0){
clearInterval(timerInterval);
submitQuiz();
}
},1000);
}

/* ================= PROGRESS ================= */

function updateProgress(){
let answered = document.querySelectorAll("input[type=radio]:checked").length;
document.getElementById("answeredCount").innerText=answered;
document.getElementById("progressBar").style.width=
(answered/20*100)+"%";
}

/* ================= SUBMIT ================= */

function submitQuiz(){

clearInterval(timerInterval);

let score=0;

currentQuestions.forEach((q,index)=>{

let selected = document.querySelector(`input[name="q${index}"]:checked`);
let labels = document.querySelectorAll(`input[name="q${index}"]`);

labels.forEach((input,i)=>{
let parent = input.parentElement;
parent.innerHTML = input.nextSibling.textContent;

if(q.answers[i].correct){
parent.innerHTML += "<span class='correct-icon'> ✓</span>";
}
if(selected && i==selected.value && !q.answers[i].correct){
parent.innerHTML += "<span class='wrong-icon'> ✗</span>";
}
});

if(selected && q.answers[selected.value].correct){
score++;
}

});

document.getElementById("submitBtn").style.display="none";

document.getElementById("result").innerHTML=
`<div class="score">Kết quả: ${score}/20</div>
<button class="home-btn" onclick="goHome()">Quay về trang chủ</button>`;

}

/* ================= HOME ================= */

function goHome(){

document.getElementById("menu").style.display="block";
document.getElementById("quizForm").style.display="none";
document.getElementById("submitBtn").style.display="none";
document.getElementById("info").style.display="none";
document.getElementById("quizForm").innerHTML="";
document.getElementById("result").innerHTML="";
document.getElementById("answeredCount").innerText="0";
document.getElementById("progressBar").style.width="0%";
clearInterval(timerInterval);

}

</script>
