<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIỂM TRA NHẬN THỨC CHÍNH TRỊ</title>

<style>
body{
margin:0;
font-family:"Times New Roman", Times, serif;
background:#8B0000;
padding-bottom:120px;   /* TĂNG LÊN */
}

.header{
background:#b30000;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:flex-start;
}
.footer{
position: fixed;
bottom: 0;
left: 0;
width: 100%;   /* Sửa 90% thành 100% */
background: linear-gradient(90deg,#8B0000,#cc0000,#8B0000);
color: yellow;
text-align: center;
padding: 18px;
font-weight: bold;
font-size: 20px;
letter-spacing: 2px;
text-shadow: 1px 1px 2px black;
z-index: 999;
}
.logo{
width:80px;
height:auto;
margin-right:15px;
}

.container{
max-width:1000px;
margin:20px auto;
background:white;
padding:25px;
border-radius:10px;
}

h1{text-align:center;color:#8B0000;}

.menu button{
display:block;
width:100%;
margin:10px 0;
padding:15px;
font-size:30px;
background:#8B0000;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
transition:0.3s;
font-family:"Times New Roman", Times, serif;
}

.menu button:hover{
transform:scale(1.05);
background:#cc0000;
}

.question-box{
background:#fff4f4;
padding:15px;
margin-bottom:15px;
border-left:6px solid #8B0000;
border-radius:6px;
}

.question-title{
font-weight:bold;
margin-bottom:8px;
}

.correct-icon{
color:green;
font-weight:bold;
margin-left:10px;
}

.wrong-icon{
color:red;
font-weight:bold;
margin-left:10px;
}

.sticky-progress{
position:sticky;
top:0;
background:white;
padding:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
z-index:1000;
}

.progress-bar-container{
width:100%;
height:18px;
background:#ddd;
border-radius:8px;
overflow:hidden;
margin-top:5px;
}

.progress-bar{
height:100%;
width:0%;
background:green;
transition:0.3s;
}

.submit-btn,.home-btn{
padding:10px 15px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-family:"Times New Roman", Times, serif;
}

.submit-btn{background:green;color:white;}
.home-btn{background:#444;color:white;}

.timer{text-align:right;color:#8B0000;font-weight:bold;}
.score{text-align:center;font-size:20px;font-weight:bold;}
</style>
</head>

<body>

<div class="header">
<img src="logo.png" class="logo">
<div>
<b>ĐẠI ĐỘI THÔNG TIN 2</b><br>
"Kịp thời - Chính xác - Bí mật - An toàn"
</div>
</div>

<div class="container">
<h1>KIỂM TRA NHẬN THỨC CHÍNH TRỊ</h1>

<div id="menu" class="menu">
<button onclick="startQuiz('bo1')">SĨ QUAN</button>
<button onclick="startQuiz('bo2')">QUÂN NHÂN CHUYÊN NGHIỆP</button>
<button onclick="startQuiz('bo3')">CHIẾN SĨ</button>
</div>

<div id="info" style="display:none;" class="sticky-progress">
<div id="timer" class="timer"></div>
Đã làm: <span id="answeredCount">0</span>/<span id="totalQuestion">0</span>
<div class="progress-bar-container">
<div id="progressBar" class="progress-bar"></div>
</div>
</div>

<form id="quizForm" style="display:none;"></form>
<button id="submitBtn" class="submit-btn" style="display:none;" onclick="submitQuiz()">Nộp bài</button>
<div id="result"></div>

</div>

<script src="questions.js"></script>

<script>

let currentQuestions=[];
let timerInterval;
let timeLeft=1200;

function startQuiz(type){

document.getElementById("menu").style.display="none";
document.getElementById("quizForm").style.display="block";
document.getElementById("submitBtn").style.display="inline-block";
document.getElementById("info").style.display="block";
document.getElementById("result").innerHTML="";

currentQuestions=shuffle([...questionSets[type]]);
document.getElementById("totalQuestion").innerText=currentQuestions.length;

renderQuestions();
startTimer();
}

function renderQuestions(){
let form=document.getElementById("quizForm");
form.innerHTML="";

currentQuestions.forEach((q,index)=>{
let div=document.createElement("div");
div.className="question-box";

div.innerHTML=`<div class="question-title">
Câu ${index+1}: ${q.question}
</div>`;

q.answers.forEach((a,i)=>{
div.innerHTML+=`
<label>
<input type="radio" name="q${index}" value="${i}" onchange="updateProgress()">
${a.text}
</label><br>`;
});

form.appendChild(div);
});
}

function updateProgress(){
let answered=document.querySelectorAll("input[type=radio]:checked").length;
document.getElementById("answeredCount").innerText=answered;
document.getElementById("progressBar").style.width=
(answered/currentQuestions.length*100)+"%";
}

function startTimer(){
timeLeft=1200;
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
document.getElementById("timer").innerHTML=
"Thời gian: "+m+":"+(s<10?"0":"")+s;
timeLeft--;
if(timeLeft<0){
clearInterval(timerInterval);
submitQuiz();
}
},1000);
}

function submitQuiz(){

clearInterval(timerInterval);
let score=0;

currentQuestions.forEach((q,index)=>{
let selected=document.querySelector(`input[name="q${index}"]:checked`);

if(selected && q.answers[selected.value].correct){
score++;
}
});

let total=currentQuestions.length;
let percent=(score/total)*100;

let message = percent>=70
? "<div style='color:green;font-size:22px;font-weight:bold;'>Kết quả: ĐẠT</div><div>Chúc mừng đã đạt được kết quả cao</div>"
: "<div style='color:red;font-size:22px;font-weight:bold;'>Kết quả: KHÔNG ĐẠT</div><div>Bạn cần ôn luyện thêm</div>";

document.getElementById("submitBtn").style.display="none";

document.getElementById("result").innerHTML=`
<div class="score">Điểm số: ${score}/${total} (${percent.toFixed(0)}%)</div>
${message}
<button class="home-btn" onclick="goHome()">Trang chủ</button>
`;
}

function goHome(){
document.getElementById("menu").style.display="block";
document.getElementById("quizForm").style.display="none";
document.getElementById("submitBtn").style.display="none";
document.getElementById("info").style.display="none";
document.getElementById("quizForm").innerHTML="";
document.getElementById("result").innerHTML="";
document.getElementById("answeredCount").innerText="0";
document.getElementById("progressBar").style.width="0%";
clearInterval(timerInterval);
}

</script>
<div class="footer">
QUYẾT TÂM HOÀN THÀNH XUẤT SẮC NHIỆM VỤ HUẤN LUYỆN NĂM 2026
</div>
</body>
</html>
