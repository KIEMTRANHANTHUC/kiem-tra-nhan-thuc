<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIỂM TRA NHẬN THỨC CHÍNH TRỊ</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#8B0000,#c40000);
}

.container{
max-width:900px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#8B0000;
margin-bottom:30px;
}

.menu{
text-align:center;
}

.menu button{
display:block;
width:100%;
margin:10px 0;
padding:15px;
font-size:16px;
border:none;
border-radius:8px;
background:#8B0000;
color:white;
cursor:pointer;
transition:0.3s;
}

.menu button:hover{
background:#c40000;
transform:scale(1.02);
}

.question{
margin-bottom:20px;
padding:15px;
background:#f7f7f7;
border-radius:8px;
}

button.submit-btn{
background:#006400;
}

button.home-btn{
background:#444;
margin-top:20px;
}

.correct{color:green;font-weight:bold;}
.wrong{color:red;font-weight:bold;}
.score{
font-size:20px;
text-align:center;
margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container">
<h1>KIỂM TRA NHẬN THỨC CHÍNH TRỊ</h1>

<div id="menu" class="menu">
<button onclick="startQuiz('bo1')">SĨ QUAN</button>
<button onclick="startQuiz('bo2')">QUÂN NHÂN CHUYÊN NGHIỆP</button>
<button onclick="startQuiz('bo3')">CHIẾN SĨ</button>
</div>

<form id="quizForm" style="display:none;"></form>
<button id="submitBtn" class="submit-btn" style="display:none;" onclick="submitQuiz()">Nộp bài</button>

<div id="result"></div>

</div>

<script>

function generateQuestions(prefix){
let arr=[];
for(let i=1;i<=20;i++){
arr.push({
question:`${prefix} - Câu hỏi số ${i}?`,
answers:["Đáp án A","Đáp án B","Đáp án C","Đáp án D"],
correct:0
});
}
return arr;
}

const questionBanks={
bo1:generateQuestions("sĨ QUAN"),
bo2:generateQuestions("QUÂN NHÂN CHUYÊN NGHIỆP"),
bo3:generateQuestions("CHIẾN SĨ")
};

let currentQuestions=[];

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function startQuiz(bo){
document.getElementById("menu").style.display="none";
document.getElementById("quizForm").style.display="block";
document.getElementById("submitBtn").style.display="block";
document.getElementById("result").innerHTML="";

currentQuestions=shuffle(questionBanks[bo]);
const form=document.getElementById("quizForm");
form.innerHTML="";

currentQuestions.forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
div.innerHTML=`<p><b>${i+1}. ${q.question}</b></p>`;
q.answers.forEach((a,index)=>{
div.innerHTML+=`<label><input type="radio" name="q${i}" value="${index}"> ${a}</label><br>`;
});
form.appendChild(div);
});
}

function submitQuiz(){
let passText="";
if(score >= 16){
    passText="<p style='color:green;font-size:20px;font-weight:bold;'>KẾT QUẢ: ĐẠT</p>";
}else{
    passText="<p style='color:red;font-size:20px;font-weight:bold;'>KẾT QUẢ: KHÔNG ĐẠT</p>";
}
resultHTML=`<div class="score">Điểm của bạn: ${score}/20</div>`+passText+resultHTML;
}else{
resultHTML+=`<p class="wrong">Câu ${i+1}: SAI (Đáp án đúng: ${q.answers[q.correct]})</p>`;
}
});
resultHTML=`<div class="score">Điểm của bạn: ${score}/20</div>`+resultHTML;
resultHTML+=`<button class="home-btn" onclick="goHome()">Quay về trang chủ</button>`;

document.getElementById("quizForm").style.display="none";
document.getElementById("submitBtn").style.display="none";
document.getElementById("result").innerHTML=resultHTML;
}

function goHome(){
document.getElementById("menu").style.display="block";
document.getElementById("result").innerHTML="";
}

</script>

</body>
</html>
