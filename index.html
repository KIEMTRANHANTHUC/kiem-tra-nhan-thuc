<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIỂM TRA NHẬN THỨC CHÍNH TRỊ</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#8B0000;
}

.header{
background:#b30000;
color:white;
padding:15px;
display:flex;
align-items:center;
}

.logo{
width:60px;
margin-right:15px;
}

.container{
max-width:1000px;
margin:20px auto;
background:white;
padding:25px;
border-radius:10px;
}

h1{text-align:center;color:#8B0000;}

.menu button{
display:block;
width:100%;
margin:10px 0;
padding:15px;
font-size:16px;
background:#8B0000;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.menu button:hover{
transform:scale(1.05);
background:#cc0000;
}

.question-box{
background:#fff4f4;
padding:15px;
margin-bottom:15px;
border-left:6px solid #8B0000;
border-radius:6px;
}

.question-title{
font-weight:bold;
margin-bottom:8px;
}

.correct-icon{
color:green;
font-weight:bold;
margin-left:10px;
}

.wrong-icon{
color:red;
font-weight:bold;
margin-left:10px;
}

.sticky-progress{
position:sticky;
top:0;
background:white;
padding:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
z-index:1000;
}

.progress-bar-container{
width:100%;
height:18px;
background:#ddd;
border-radius:8px;
overflow:hidden;
margin-top:5px;
}

.progress-bar{
height:100%;
width:0%;
background:green;
transition:0.3s;
}

.submit-btn,.home-btn{
padding:10px 15px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.submit-btn{background:green;color:white;}
.home-btn{background:#444;color:white;}

.timer{text-align:right;color:#8B0000;font-weight:bold;}
.score{text-align:center;font-size:20px;font-weight:bold;}
</style>
</head>

<body>

<div class="header">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Emblem_of_the_People%27s_Army_of_Vietnam.svg/1024px-Emblem_of_the_People%27s_Army_of_Vietnam.svg.png" class="logo">
<div>
<b>ĐẠI ĐỘI TT</b><br>
"Kịp thời - Chính xác - Bí mật - An toàn"
</div>
</div>

<div class="container">
<h1>KIỂM TRA NHẬN THỨC CHÍNH TRỊ</h1>

<div id="menu" class="menu">
<button onclick="startQuiz('bo1')">SĨ QUAN</button>
<button onclick="startQuiz('bo2')">QUÂN NHÂN CHUYÊN NGHIỆP</button>
<button onclick="startQuiz('bo3')">CHIẾN SĨ</button>
</div>

<div id="info" style="display:none;" class="sticky-progress">
<div id="timer" class="timer"></div>
Đã làm: <span id="answeredCount">0</span>/20
<div class="progress-bar-container">
<div id="progressBar" class="progress-bar"></div>
</div>
</div>

<form id="quizForm" style="display:none;"></form>
<button id="submitBtn" class="submit-btn" style="display:none;" onclick="submitQuiz()">Nộp bài</button>
<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
