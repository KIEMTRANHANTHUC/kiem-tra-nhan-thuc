<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIỂM TRA NHẬN THỨC CHÍNH TRỊ</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#8B0000;
}

.header{
background:#b30000;
color:white;
padding:15px;
display:flex;
align-items:center;
}

.logo{
width:60px;
margin-right:15px;
}

.container{
max-width:1000px;
margin:20px auto;
background:white;
padding:25px;
border-radius:10px;
}

h1{text-align:center;color:#8B0000;}

.menu button{
display:block;
width:100%;
margin:10px 0;
padding:15px;
font-size:16px;
background:#8B0000;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.menu button:hover{
background:#cc0000;
}

.question-box{
background:#fff4f4;
padding:15px;
margin-bottom:15px;
border-left:6px solid #8B0000;
border-radius:6px;
}

.question-title{
font-weight:bold;
margin-bottom:8px;
}

.progress-bar-container{
width:100%;
height:18px;
background:#ddd;
border-radius:8px;
overflow:hidden;
margin-top:5px;
}

.progress-bar{
height:100%;
width:0%;
background:green;
transition:0.3s;
}

.submit-btn{
padding:10px 15px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
background:green;
color:white;
}

.score{
text-align:center;
font-size:20px;
font-weight:bold;
margin-top:15px;
}

.timer{text-align:right;color:#8B0000;font-weight:bold;}
</style>
</head>

<body>

<div class="header">
<div>
<b>ĐẠI ĐỘI TT</b><br>
"Kịp thời - Chính xác - Bí mật - An toàn"
</div>
</div>

<div class="container">
<h1>KIỂM TRA NHẬN THỨC CHÍNH TRỊ</h1>

<div id="menu" class="menu">
<button onclick="startQuiz()">BẮT ĐẦU KIỂM TRA</button>
</div>

<div id="info" style="display:none;">
Đã làm: <span id="answeredCount">0</span>/<span id="totalQuestion"></span>
<div class="progress-bar-container">
<div id="progressBar" class="progress-bar"></div>
</div>
</div>

<form id="quizForm" style="display:none;"></form>
<button id="submitBtn" class="submit-btn" style="display:none;" onclick="submitQuiz()">Nộp bài</button>

<div id="result"></div>

</div>

<script>

const questions = [
{
question:"Phương châm '5 vững' bao gồm bao nhiêu nội dung?",
answers:[
{text:"3",correct:false},
{text:"4",correct:false},
{text:"5",correct:true},
{text:"6",correct:false}
]
},
{
question:"'2 kiên định' trước hết là kiên định mục tiêu nào?",
answers:[
{text:"Công nghiệp hóa",correct:false},
{text:"Chủ nghĩa xã hội",correct:true},
{text:"Đô thị hóa",correct:false},
{text:"Toàn cầu hóa",correct:false}
]
},
{
question:"'2 ngăn ngừa' nhằm ngăn ngừa điều gì?",
answers:[
{text:"Thiếu ngân sách",correct:false},
{text:"Suy thoái tư tưởng chính trị",correct:true},
{text:"Thiếu quân số",correct:false},
{text:"Thiếu trang bị",correct:false}
]
}
];

function startQuiz(){

document.getElementById("menu").style.display="none";
document.getElementById("quizForm").style.display="block";
document.getElementById("submitBtn").style.display="inline-block";
document.getElementById("info").style.display="block";

const form=document.getElementById("quizForm");
form.innerHTML="";

questions.forEach((q,index)=>{
let div=document.createElement("div");
div.className="question-box";

div.innerHTML=`
<div class="question-title">${index+1}. ${q.question}</div>
${q.answers.map(a=>`
<label>
<input type="radio" name="q${index}" value="${a.correct}" onchange="updateProgress()">
${a.text}
</label><br>
`).join("")}
`;

form.appendChild(div);
});

document.getElementById("totalQuestion").innerText=questions.length;
}

function updateProgress(){
let answered=0;
questions.forEach((q,i)=>{
if(document.querySelector(`input[name="q${i}"]:checked`)){
answered++;
}
});

document.getElementById("answeredCount").innerText=answered;

let percent=(answered/questions.length)*100;
document.getElementById("progressBar").style.width=percent+"%";
}

function submitQuiz(){

let score=0;

questions.forEach((q,i)=>{
let selected=document.querySelector(`input[name="q${i}"]:checked`);
if(selected && selected.value==="true"){
score++;
}
});

let percent=(score/questions.length)*100;

let resultHTML=`<div class="score">Bạn trả lời đúng ${score}/${questions.length} câu (${percent.toFixed(0)}%)</div>`;

if(percent>=70){
resultHTML+=`
<div style="color:green;font-size:22px;font-weight:bold;text-align:center;">
Chúc mừng đã đạt được kết quả cao
</div>
`;
}else{
resultHTML+=`
<div style="color:red;font-size:22px;font-weight:bold;text-align:center;">
KẾT QUẢ: KHÔNG ĐẠT
</div>
<div style="text-align:center;">
Bạn cần ôn luyện thêm
</div>
`;
}

document.getElementById("result").innerHTML=resultHTML;
document.getElementById("submitBtn").style.display="none";
}

</script>

</body>
</html>
