<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIỂM TRA NHẬN THỨC CHÍNH TRỊ</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(rgba(139,0,0,0.95), rgba(139,0,0,0.95)),
url("https://upload.wikimedia.org/wikipedia/commons/thumb/2/21/Flag_of_Vietnam.svg/1200px-Flag_of_Vietnam.svg.png");
background-size:cover;
background-attachment:fixed;
}

/* ===== HEADER ===== */
.header{
background:linear-gradient(to right,#8B0000,#b30000);
color:white;
padding:15px 20px;
display:flex;
align-items:center;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.logo{
width:70px;
height:70px;
margin-right:15px;
border-radius:50%;
background:white;
padding:5px;
}

.unit-info{flex:1;}

.unit-name{
font-size:20px;
font-weight:bold;
text-transform:uppercase;
letter-spacing:1px;
}

.slogan{
font-size:14px;
font-style:italic;
margin-top:5px;
}

.clock{
font-size:14px;
text-align:right;
}

/* ===== CONTAINER ===== */
.container{
max-width:950px;
margin:30px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
animation:fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

h1{
text-align:center;
color:#8B0000;
margin-top:0;
}

/* ===== MENU ===== */
.menu button{
display:block;width:100%;margin:10px 0;
padding:15px;font-size:16px;border:none;
border-radius:8px;background:#8B0000;
color:white;cursor:pointer;
transition:0.3s;
}
.menu button:hover{
background:#cc0000;
transform:scale(1.02);
}

/* ===== QUESTIONS ===== */
.question-box{
margin-bottom:20px;
padding:15px;
border-radius:10px;
background:#fff8f8;
border-left:8px solid #8B0000;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.question-title{
font-weight:bold;
margin-bottom:10px;
padding:8px;
background:#ffeaea;
border-radius:6px;
}

.answers label{
display:block;
padding:6px;
border-radius:5px;
cursor:pointer;
}

.answers label:hover{
background:#f2f2f2;
}

.correct-icon{color:green;font-weight:bold;margin-left:10px;}
.wrong-icon{color:red;font-weight:bold;margin-left:10px;}

.submit-btn{
background:#006400;
color:white;
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

.home-btn{
background:#444;
color:white;
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

.score{
font-size:20px;
text-align:center;
margin-bottom:20px;
font-weight:bold;
}

.timer{
text-align:right;
font-weight:bold;
color:#8B0000;
}

/* ===== PROGRESS ===== */
.sticky-progress{
position:sticky;
top:0;
background:white;
padding:10px;
z-index:1000;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:15px;
}

.progress-text{font-weight:bold;color:#8B0000;}

.progress-bar-container{
width:100%;height:18px;background:#ddd;
border-radius:10px;overflow:hidden;margin-top:5px;
}
.progress-bar{
height:100%;width:0%;
background:#006400;transition:0.3s;
}
</style>
</head>

<body>

<div class="header">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Emblem_of_the_People%27s_Army_of_Vietnam.svg/1024px-Emblem_of_the_People%27s_Army_of_Vietnam.svg.png" class="logo">
<div class="unit-info">
<div class="unit-name">ĐƠN VỊ: TRUNG ĐOÀN XXX</div>
<div class="slogan">
"Trung thành - Kỷ luật - Đoàn kết - Quyết thắng"
</div>
</div>
<div class="clock" id="clock"></div>
</div>

<div class="container">
<h1>KIỂM TRA NHẬN THỨC CHÍNH TRỊ</h1>

<div id="menu" class="menu">
<button onclick="startQuiz('bo1')">SĨ QUAN</button>
<button onclick="startQuiz('bo2')">QUÂN NHÂN CHUYÊN NGHIỆP</button>
<button onclick="startQuiz('bo3')">CHIẾN SĨ</button>
</div>

<div id="info" style="display:none;" class="sticky-progress">
<input type="text" id="fullname" placeholder="Nhập họ và tên" style="width:100%;padding:10px;margin-bottom:8px;">
<div id="timer" class="timer"></div>
<div class="progress-text">
Đã làm: <span id="answeredCount">0</span>/20 câu
</div>
<div class="progress-bar-container">
<div id="progressBar" class="progress-bar"></div>
</div>
</div>

<form id="quizForm" style="display:none;"></form>
<button id="submitBtn" class="submit-btn" style="display:none;" onclick="submitQuiz()">Nộp bài</button>
<div id="result"></div>

</div>

<script>
// Đồng hồ thời gian thực
function updateClock(){
let now = new Date();
document.getElementById("clock").innerHTML =
now.toLocaleString("vi-VN");
}
setInterval(updateClock,1000);
updateClock();

/* GIỮ NGUYÊN TOÀN BỘ JS THI HIỆN TẠI CỦA BẠN Ở ĐÂY */
</script>

</body>
</html>
