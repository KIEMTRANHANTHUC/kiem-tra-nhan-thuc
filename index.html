<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIỂM TRA NHẬN THỨC CHÍNH TRỊ</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#8B0000,#c40000);
}
.container{
max-width:900px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}
h1{text-align:center;color:#8B0000;}
.menu button{
display:block;width:100%;margin:10px 0;
padding:15px;font-size:16px;border:none;
border-radius:8px;background:#8B0000;
color:white;cursor:pointer;
}
.menu button:hover{background:#c40000;}
.question{
margin-bottom:20px;padding:15px;
background:#f7f7f7;border-radius:8px;
}
.submit-btn{background:#006400;color:white;}
.home-btn{background:#444;color:white;margin-top:20px;}
.correct{color:green;font-weight:bold;}
.wrong{color:red;font-weight:bold;}
.score{font-size:20px;text-align:center;margin-bottom:20px;}
.timer{text-align:right;font-weight:bold;color:#8B0000;}

/* ====== THANH TIẾN ĐỘ ====== */
.sticky-progress{
position:sticky;
top:0;
background:white;
padding:10px;
z-index:1000;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:15px;
}

.progress-text{
font-weight:bold;
color:#8B0000;
}

.progress-bar-container{
width:100%;
height:18px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-top:5px;
}

.progress-bar{
height:100%;
width:0%;
background:#006400;
transition:0.3s;
}
</style>
</head>

<body>
<div class="container">
<h1>KIỂM TRA NHẬN THỨC CHÍNH TRỊ</h1>

<div id="menu" class="menu">
<button onclick="startQuiz('bo1')">SĨ QUAN</button>
<button onclick="startQuiz('bo2')">QUÂN NHÂN CHUYÊN NGHIỆP</button>
<button onclick="startQuiz('bo3')">CHIẾN SĨ</button>
</div>

<div id="info" style="display:none;" class="sticky-progress">
<input type="text" id="fullname" placeholder="Nhập họ và tên" style="width:100%;padding:10px;margin-bottom:8px;">
<div id="timer" class="timer"></div>

<div class="progress-text">
Đã làm: <span id="answeredCount">0</span>/20 câu
</div>

<div class="progress-bar-container">
<div id="progressBar" class="progress-bar"></div>
</div>
</div>

<form id="quizForm" style="display:none;"></form>
<button id="submitBtn" class="submit-btn" style="display:none;" onclick="submitQuiz()">Nộp bài</button>
<div id="result"></div>

</div>

<script>

function generateQuestions(prefix){
let arr=[];
for(let i=1;i<=20;i++){
arr.push({
question:`${prefix} - Câu hỏi số ${i}?`,
answers:["Đáp án A","Đáp án B","Đáp án C","Đáp án D"],
correct:0
});
}
return arr;
}

const questionBanks={
bo1:generateQuestions("SĨ QUAN"),
bo2:generateQuestions("QUÂN NHÂN CHUYÊN NGHIỆP"),
bo3:generateQuestions("CHIẾN SĨ")
};

let currentQuestions=[];
let timeLeft=1200;
let timerInterval;

function shuffle(a){
return [...a].sort(()=>Math.random()-0.5);
}

function startQuiz(bo){
document.getElementById("menu").style.display="none";
document.getElementById("quizForm").style.display="block";
document.getElementById("submitBtn").style.display="block";
document.getElementById("info").style.display="block";
document.getElementById("result").innerHTML="";

currentQuestions=shuffle(questionBanks[bo]);
const form=document.getElementById("quizForm");
form.innerHTML="";

document.getElementById("answeredCount").innerText="0";
document.getElementById("progressBar").style.width="0%";

currentQuestions.forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
div.innerHTML=`<p><b>${i+1}. ${q.question}</b></p>`;
q.answers.forEach((a,index)=>{
div.innerHTML+=`<label>
<input type="radio" name="q${i}" value="${index}" onclick="updateProgress()"> ${a}
</label><br>`;
});
form.appendChild(div);
});

timeLeft=1200;
startTimer();
}

function updateProgress(){
let answered=0;
for(let i=0;i<20;i++){
if(document.querySelector(`input[name="q${i}"]:checked`)){
answered++;
}
}
document.getElementById("answeredCount").innerText=answered;
let percent=(answered/20)*100;
document.getElementById("progressBar").style.width=percent+"%";
}

function startTimer(){
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
let minutes=Math.floor(timeLeft/60);
let seconds=timeLeft%60;
document.getElementById("timer").innerHTML=
`Thời gian còn lại: ${minutes}:${seconds<10?'0':''}${seconds}`;
timeLeft--;

if(timeLeft<0){
clearInterval(timerInterval);
alert("Hết giờ! Bài sẽ được nộp tự động.");
submitQuiz();
}
},1000);
}

function submitQuiz(){
clearInterval(timerInterval);

let score=0;
let resultHTML="";
let formData=new FormData(document.getElementById("quizForm"));

currentQuestions.forEach((q,i)=>{
let answer=formData.get(`q${i}`);
if(answer==q.correct){
score++;
resultHTML+=`<p class="correct">Câu ${i+1}: ĐÚNG</p>`;
}else{
resultHTML+=`<p class="wrong">Câu ${i+1}: SAI (Đáp án đúng: ${q.answers[q.correct]})</p>`;
}
});

let passText=score>=16
? "<p style='color:green;font-size:20px;font-weight:bold;'>KẾT QUẢ: ĐẠT</p>"
: "<p style='color:red;font-size:20px;font-weight:bold;'>KẾT QUẢ: KHÔNG ĐẠT</p>";

resultHTML=`<div class="score">Điểm của bạn: ${score}/20</div>`+passText+resultHTML;
resultHTML+=`<button class="home-btn" onclick="goHome()">Quay về trang chủ</button>`;

document.getElementById("quizForm").style.display="none";
document.getElementById("submitBtn").style.display="none";
document.getElementById("info").style.display="none";
document.getElementById("result").innerHTML=resultHTML;
}

function goHome(){
document.getElementById("menu").style.display="block";
document.getElementById("result").innerHTML="";
}

</script>

</body>
</html>
